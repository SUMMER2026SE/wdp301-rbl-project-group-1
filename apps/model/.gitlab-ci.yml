default:
  tags:
    - edura-runner

stages:
  - test
  - build
  - deploy

variables:
  # Đường dẫn Google Artifact Registry
  ARTIFACT_REGISTRY: asia-southeast1-docker.pkg.dev/edura-495704/edura-repo
  DOCKER_IMAGE_LATEST: $ARTIFACT_REGISTRY/edura-model:latest
  # Thông tin Workload Identity Federation
  WORKLOAD_IDENTITY_PROVIDER: "projects/580325392054/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab-provider"
  SERVICE_ACCOUNT: "gitlab-ci-deploy@edura-495704.iam.gserviceaccount.com"

# -----------------------------------------------------------
# TEST
# -----------------------------------------------------------
test:
  image: python:3.10-slim
  stage: test
  script:
    # Cài bản PyTorch CPU trước để tránh tải bản CUDA nặng 2.5GB giống như bên Dockerfile
    - pip install --upgrade pip typing_extensions
    - pip install "torch>=2.6.0" torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
    - pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
    - python -m py_compile main.py
  rules:
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|edura)$/'

# -----------------------------------------------------------
# BUILD DOCKER & PUSH TO GOOGLE ARTIFACT REGISTRY
# -----------------------------------------------------------
build_docker:
  image: google/cloud-sdk:alpine
  stage: build
  services:
    - docker:24.0.5-dind
  id_tokens:
    GCP_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - echo "Cài đặt Docker CLI..."
    - apk add --no-cache docker-cli

    - echo "Xác thực với Google Cloud bằng Workload Identity Federation..."
    - echo ${GCP_OIDC_TOKEN} > /tmp/oidc_token.txt
    - gcloud iam workload-identity-pools create-cred-config ${WORKLOAD_IDENTITY_PROVIDER} --service-account=${SERVICE_ACCOUNT} --credential-source-file=/tmp/oidc_token.txt --output-file=/tmp/gcp_cred.json
    - gcloud auth login --cred-file=/tmp/gcp_cred.json
    
    - echo "Cấu hình Docker login vào Artifact Registry..."
    - gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet
    
    - echo "Build Docker image..."
    - docker build -t $DOCKER_IMAGE_LATEST .
    
    - echo "Push Docker image lên Google Artifact Registry..."
    - docker push $DOCKER_IMAGE_LATEST
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|edura)$/'

# -----------------------------------------------------------
# DEPLOY TO GOOGLE CLOUD RUN
# -----------------------------------------------------------
deploy_to_cloud_run:
  stage: deploy
  image: google/cloud-sdk:latest
  id_tokens:
    GCP_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - echo "Xác thực với Google Cloud bằng Workload Identity Federation..."
    - echo ${GCP_OIDC_TOKEN} > /tmp/oidc_token.txt
    - gcloud iam workload-identity-pools create-cred-config ${WORKLOAD_IDENTITY_PROVIDER} --service-account=${SERVICE_ACCOUNT} --credential-source-file=/tmp/oidc_token.txt --output-file=/tmp/gcp_cred.json
    - gcloud auth login --cred-file=/tmp/gcp_cred.json
    - gcloud config set project edura-495704
    
    - echo "Deploy lên Cloud Run..."
    - >
      gcloud run deploy edura-model 
      --image $DOCKER_IMAGE_LATEST 
      --region asia-southeast1 
      --platform managed 
      --allow-unauthenticated 
      --memory 2Gi 
      --cpu 1 
      --min-instances 0 
      --max-instances 1
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|edura)$/'
  environment:
    name: production
